name: Security Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # SEC-13b: Fail on HIGH or CRITICAL vulnerabilities. MODERATE: log only.
      - name: npm audit (HIGH+)
        run: npm audit --audit-level=high

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required for Gitleaks

      # SEC-13a: Scan for accidentally committed secrets
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # SEC-13c: SAST covering TypeScript, React, Node.js, OWASP Top 10
      - name: Semgrep SAST
        run: |
          semgrep \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config .semgrep/security.yml \
            --error \
            --quiet
        # To suppress a false positive, add a comment above the line:
        # nosemgrep: <rule-id> -- reason: <justification>
