name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  biome:
    name: Biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run type:check:all

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test:backend

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test:frontend

  test-contract:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Initialise database schema
        run: npm run db:migrate
        env:
          DB_TYPE: sqlite
          SQLITE_PATH: file:./dev.db
      - name: Start backend server
        run: npm run start &
        env:
          DB_TYPE: sqlite
          SQLITE_PATH: file:./dev.db
          PORT: 3001
          GEOCODING_ENABLED: false
          BYPASS_AUTH: true
      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          curl -sf http://localhost:3001/health || (echo "Backend did not start in time" && exit 1)
      - run: npm run test:contract
